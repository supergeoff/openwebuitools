name: Deploy Filters

on:
  push:
    branches: [ main ]
    paths:
      - 'filters/**'
  workflow_dispatch:

jobs:
  deploy-filters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Deploy filters to OpenWebUI
        env:
          OPENWEBUI_URL: ${{ secrets.OPENWEBUI_URL }}
          OPENWEBUI_API_KEY: ${{ secrets.OPENWEBUI_API_KEY }}
        run: python .github/scripts/deploy-filters.py
