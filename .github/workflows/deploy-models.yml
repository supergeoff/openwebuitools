name: Deploy OpenWebUI Models

on:
  push:
    branches: [ main ]
    paths:
      - 'models/**'
  workflow_dispatch:

jobs:
  deploy-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Deploy models to OpenWebUI
        env:
          OPENWEBUI_URL: ${{ secrets.OPENWEBUI_URL }}
          OPENWEBUI_API_KEY: ${{ secrets.OPENWEBUI_API_KEY }}
        run: python scripts/deploy-models.py
